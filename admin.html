<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Direciona — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#f5f2ec; --card:#fff; --line:#e3ddd3; --text:#1c1917; --muted:#78716c;
      --primary:#1e3a5f; --accent:#c8843a; --good:#16653433; --good-text:#166534;
      --warn:#92400e33; --warn-text:#92400e; --danger:#b91c1c33; --danger-text:#b91c1c;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--text); font-family:'Plus Jakarta Sans',Arial,sans-serif; padding:20px; }
    .wrap { max-width:1100px; margin:0 auto; }
    h1 { font-family:'Cormorant Garamond',serif; font-size:32px; font-weight:600; margin-bottom:6px; color:var(--primary); }
    .sub { color:var(--muted); font-size:14px; margin-bottom:24px; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:18px; padding:20px; margin-bottom:18px; box-shadow:0 4px 16px rgba(28,25,23,.05); }
    .row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    input, select { border:1.5px solid var(--line); border-radius:10px; padding:10px 12px; font-size:14px; font-family:inherit; background:#fdfcfa; outline:none; }
    input:focus, select:focus { border-color:#93b4d8; }
    .btn { border:0; border-radius:10px; padding:10px 16px; font-size:13.5px; font-weight:700; cursor:pointer; font-family:inherit; }
    .btn.primary { background:var(--primary); color:#fff; }
    .btn.danger { background:var(--danger-text); color:#fff; }
    .btn.warn { background:var(--accent); color:#fff; }
    .btn.outline { background:transparent; border:1.5px solid var(--line); color:var(--text); }
    .btn:hover { opacity:.88; }
    table { width:100%; border-collapse:collapse; font-size:13.5px; }
    th, td { text-align:left; padding:11px 8px; border-bottom:1px solid var(--line); vertical-align:middle; }
    th { font-size:11px; text-transform:uppercase; color:var(--muted); letter-spacing:.06em; font-weight:700; }
    code { font-family:'Courier New',monospace; background:#fdfcfa; padding:3px 6px; border-radius:6px; font-size:12.5px; user-select:all; }
    .pill { display:inline-block; padding:3px 9px; border-radius:999px; font-size:11px; font-weight:700; }
    .pill.active { background:var(--good); color:var(--good-text); }
    .pill.canceled { background:var(--danger); color:var(--danger-text); }
    .pill.paused { background:var(--warn); color:var(--warn-text); }
    .pill.expired { background:#999; color:#fff; }
    .meta { color:var(--muted); font-size:12px; }
    .stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:12px; }
    .stat { background:#fdfcfa; border:1px solid var(--line); border-radius:14px; padding:14px; }
    .stat .lbl { font-size:11px; text-transform:uppercase; color:var(--muted); letter-spacing:.08em; font-weight:700; margin-bottom:4px; }
    .stat .val { font-family:'Cormorant Garamond',serif; font-size:28px; font-weight:600; color:var(--primary); }
    .actions-cell { display:flex; gap:6px; flex-wrap:wrap; }
    .actions-cell .btn { padding:6px 10px; font-size:11.5px; }
    .empty { text-align:center; padding:40px; color:var(--muted); }
    @media (max-width:700px) {
      table { font-size:12px; }
      th:nth-child(3), td:nth-child(3), th:nth-child(6), td:nth-child(6) { display:none; }
    }
  </style>
</head>
<body>
<div class="wrap">
  <h1>Direciona — Admin</h1>
  <p class="sub">Gerenciamento de licenças e uso.</p>

  <!-- LOGIN -->
  <div class="card" id="loginCard">
    <h3 style="margin-bottom:10px;">Acesso administrativo</h3>
    <div class="row">
      <input type="text" id="apiBase" placeholder="https://direciona-api.SEU.workers.dev" style="flex:2; min-width:280px;">
      <input type="password" id="adminKey" placeholder="Chave admin" style="flex:1; min-width:160px;">
      <button class="btn primary" id="btnLogin">Entrar</button>
    </div>
    <p class="meta" style="margin-top:8px;">As credenciais ficam só no seu navegador (localStorage).</p>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" style="display:none;">

    <div class="card">
      <h3 style="margin-bottom:14px;">Uso (últimos 30 dias)</h3>
      <div class="stats" id="stats">
        <div class="stat"><div class="lbl">Total chamadas</div><div class="val">—</div></div>
        <div class="stat"><div class="lbl">Sucesso</div><div class="val">—</div></div>
        <div class="stat"><div class="lbl">Tokens consumidos</div><div class="val">—</div></div>
      </div>
    </div>

    <div class="card">
      <h3 style="margin-bottom:14px;">Criar nova licença</h3>
      <div class="row">
        <input type="email" id="newEmail" placeholder="email@corretor.com" style="flex:2; min-width:200px;">
        <input type="text" id="newName" placeholder="Nome (opcional)" style="flex:1.5; min-width:160px;">
        <input type="number" id="newDays" placeholder="Dias" value="30" min="1" style="width:90px;">
        <input type="text" id="newNotes" placeholder="Observação (telefone, plano)" style="flex:2; min-width:160px;">
        <button class="btn primary" id="btnCreate">Gerar chave</button>
      </div>
      <div id="createResult" style="margin-top:14px; display:none;"></div>
    </div>

    <div class="card">
      <div class="row" style="justify-content:space-between; margin-bottom:14px;">
        <h3>Licenças</h3>
        <div class="row">
          <input type="text" id="filter" placeholder="Filtrar email/chave/nome">
          <button class="btn outline" id="btnRefresh">Atualizar</button>
        </div>
      </div>
      <div id="licensesWrap"><div class="empty">Carregando...</div></div>
    </div>

    <p class="meta" style="text-align:center; margin-top:18px;">
      <a href="#" id="btnLogout" style="color:var(--muted);">Sair do admin</a>
    </p>
  </div>
</div>

<script>
const LS_API = 'direciona_admin_api';
const LS_KEY = 'direciona_admin_key';

const $ = id => document.getElementById(id);
let currentLicenses = [];

function showDashboard() {
  $('loginCard').style.display = 'none';
  $('dashboard').style.display = 'block';
}

function showLogin() {
  $('loginCard').style.display = 'block';
  $('dashboard').style.display = 'none';
}

async function api(method, path, body) {
  const apiBase = localStorage.getItem(LS_API);
  const adminKey = localStorage.getItem(LS_KEY);
  if (!apiBase || !adminKey) { showLogin(); throw new Error('No credentials'); }
  const res = await fetch(apiBase.replace(/\/$/, '') + path, {
    method,
    headers: {
      'Content-Type': 'application/json',
      'X-Admin-Key': adminKey
    },
    body: body ? JSON.stringify(body) : undefined
  });
  if (res.status === 401) {
    showLogin();
    throw new Error('Não autorizado. Verifique a chave admin.');
  }
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
  return data;
}

function formatDate(ts) {
  if (!ts) return '—';
  const d = new Date(ts);
  return d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});
}

function daysUntil(ts) {
  if (!ts) return '∞';
  const ms = ts - Date.now();
  if (ms < 0) return 'venceu';
  return Math.ceil(ms / 86400000) + ' dias';
}

function statusPill(license) {
  const expired = license.expires_at && Date.now() > license.expires_at;
  if (expired) return '<span class="pill expired">expirada</span>';
  return `<span class="pill ${license.status}">${license.status}</span>`;
}

function renderLicenses() {
  const filter = $('filter').value.trim().toLowerCase();
  const wrap = $('licensesWrap');
  const filtered = currentLicenses.filter(l => {
    if (!filter) return true;
    return (l.key + ' ' + (l.email||'') + ' ' + (l.name||'') + ' ' + (l.notes||'')).toLowerCase().includes(filter);
  });
  if (!filtered.length) { wrap.innerHTML = '<div class="empty">Nenhuma licença encontrada.</div>'; return; }

  wrap.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Chave</th><th>Cliente</th><th>Status</th><th>Vence</th><th>Uso</th><th>Último uso</th><th>Ações</th>
        </tr>
      </thead>
      <tbody>
        ${filtered.map(l => `
          <tr data-key="${l.key}">
            <td><code>${l.key}</code></td>
            <td>
              <strong>${l.name || '—'}</strong><br>
              <span class="meta">${l.email}</span>
              ${l.notes ? `<br><span class="meta">📝 ${l.notes}</span>` : ''}
            </td>
            <td>${statusPill(l)}</td>
            <td>${formatDate(l.expires_at)}<br><span class="meta">${daysUntil(l.expires_at)}</span></td>
            <td>${l.usage_count || 0}</td>
            <td><span class="meta">${l.last_used_at ? formatDate(l.last_used_at) : 'nunca'}</span></td>
            <td class="actions-cell">
              <button class="btn outline" data-act="extend" data-key="${l.key}">+30d</button>
              ${l.status === 'active'
                ? `<button class="btn warn" data-act="pause" data-key="${l.key}">Pausar</button>`
                : `<button class="btn primary" data-act="activate" data-key="${l.key}">Ativar</button>`}
              <button class="btn danger" data-act="cancel" data-key="${l.key}">Cancelar</button>
            </td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;

  wrap.querySelectorAll('[data-act]').forEach(btn => {
    btn.addEventListener('click', () => handleAction(btn.dataset.act, btn.dataset.key));
  });
}

async function handleAction(action, key) {
  try {
    if (action === 'extend') {
      await api('PATCH', '/api/admin/licenses/' + encodeURIComponent(key), { extend_days: 30 });
    } else if (action === 'pause') {
      await api('PATCH', '/api/admin/licenses/' + encodeURIComponent(key), { status: 'paused' });
    } else if (action === 'activate') {
      await api('PATCH', '/api/admin/licenses/' + encodeURIComponent(key), { status: 'active' });
    } else if (action === 'cancel') {
      if (!confirm('Cancelar licença ' + key + '? O usuário não conseguirá mais usar a IA.')) return;
      await api('PATCH', '/api/admin/licenses/' + encodeURIComponent(key), { status: 'canceled' });
    }
    await loadLicenses();
  } catch(err) {
    alert('Erro: ' + err.message);
  }
}

async function loadLicenses() {
  try {
    const data = await api('GET', '/api/admin/licenses');
    currentLicenses = data.licenses || [];
    renderLicenses();
  } catch(err) {
    if (err.message !== 'No credentials') $('licensesWrap').innerHTML = '<div class="empty">Erro: ' + err.message + '</div>';
  }
}

async function loadStats() {
  try {
    const data = await api('GET', '/api/admin/usage');
    const t = data.totals || {};
    $('stats').innerHTML = `
      <div class="stat"><div class="lbl">Total chamadas</div><div class="val">${t.total_calls || 0}</div></div>
      <div class="stat"><div class="lbl">Sucesso</div><div class="val">${t.successful_calls || 0}</div></div>
      <div class="stat"><div class="lbl">Tokens consumidos</div><div class="val">${(t.total_tokens || 0).toLocaleString('pt-BR')}</div></div>
    `;
  } catch(err) { /* silencioso */ }
}

async function createLicense() {
  const email = $('newEmail').value.trim();
  const name = $('newName').value.trim();
  const days = parseInt($('newDays').value, 10) || 30;
  const notes = $('newNotes').value.trim();
  if (!email) { alert('Email é obrigatório.'); return; }
  try {
    const data = await api('POST', '/api/admin/licenses', { email, name, days, notes });
    const lic = data.license;
    $('createResult').style.display = 'block';
    $('createResult').innerHTML = `
      <div style="background:#f0fdf4;border:1.5px solid #16653433;border-radius:12px;padding:14px;">
        <strong style="color:#166534;">✓ Licença criada</strong><br>
        Envie esta chave para o corretor:<br>
        <code style="font-size:18px;display:inline-block;margin-top:8px;padding:8px 14px;background:#fff;">${lic.key}</code>
        <button class="btn primary" style="margin-left:10px;" id="copyKeyBtn">Copiar</button>
      </div>
    `;
    $('copyKeyBtn').addEventListener('click', () => {
      navigator.clipboard.writeText(lic.key);
      $('copyKeyBtn').textContent = 'Copiado!';
    });
    $('newEmail').value = ''; $('newName').value = ''; $('newNotes').value = '';
    await loadLicenses();
    await loadStats();
  } catch(err) {
    alert('Erro: ' + err.message);
  }
}

function login() {
  const apiBase = $('apiBase').value.trim();
  const adminKey = $('adminKey').value.trim();
  if (!apiBase || !adminKey) { alert('Preencha os dois campos.'); return; }
  localStorage.setItem(LS_API, apiBase);
  localStorage.setItem(LS_KEY, adminKey);
  showDashboard();
  loadStats();
  loadLicenses();
}

function logout() {
  localStorage.removeItem(LS_KEY); // mantém o API_BASE pra facilitar
  showLogin();
}

// Init
document.addEventListener('DOMContentLoaded', () => {
  const apiBase = localStorage.getItem(LS_API);
  const adminKey = localStorage.getItem(LS_KEY);
  if (apiBase) $('apiBase').value = apiBase;
  if (apiBase && adminKey) {
    showDashboard();
    loadStats();
    loadLicenses();
  }
  $('btnLogin').addEventListener('click', login);
  $('btnLogout').addEventListener('click', e => { e.preventDefault(); logout(); });
  $('btnCreate').addEventListener('click', createLicense);
  $('btnRefresh').addEventListener('click', () => { loadStats(); loadLicenses(); });
  $('filter').addEventListener('input', renderLicenses);
  $('adminKey').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
});
</script>
</body>
</html>
