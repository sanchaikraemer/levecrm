<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Admin LeveCRM</title>

<style>
body {
  font-family: Arial;
  background:#f5f5f5;
  padding:20px;
}
.box {
  background:#fff;
  padding:20px;
  border-radius:10px;
  max-width:800px;
  margin:auto;
}
input {
  padding:10px;
  margin:5px;
}
button {
  padding:10px 15px;
  background:#2d5cff;
  color:#fff;
  border:none;
  cursor:pointer;
}
.item {
  padding:10px;
  border-bottom:1px solid #ddd;
}
</style>
</head>

<body>

<div class="box">
<h2>Painel Admin</h2>

<h3>Criar usuário</h3>
<input id="u" placeholder="email">
<input id="p" placeholder="senha">
<input id="c" placeholder="chave">
<button onclick="criar()">Criar</button>

<h3>Lista</h3>
<div id="lista"></div>

</div>

<script>
const URL = "https://lnrbpiklzymblpyrobwx.supabase.co/rest/v1/crm_access_users";
const KEY = "sb_publishable_KXVbF3c7RGFXVTtfYmrzzg_dMK04Q9q";

async function listar() {
  const res = await fetch(URL, {
    headers: {
      apikey: KEY,
      Authorization: "Bearer " + KEY
    }
  });
  const data = await res.json();

  let html = "";
  data.forEach(i => {
    html += `<div class="item">${i.usuario} | ${i.chave}</div>`;
  });

  document.getElementById("lista").innerHTML = html;
}

async function criar() {
  const usuario = document.getElementById("u").value;
  const senha = document.getElementById("p").value;
  const chave = document.getElementById("c").value;

  await fetch(URL, {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      apikey:KEY,
      Authorization:"Bearer " + KEY
    },
    body: JSON.stringify({
      usuario,
      senha,
      chave,
      status:"ativo"
    })
  });

  listar();
}

listar();
</script>

</body>
</html>
