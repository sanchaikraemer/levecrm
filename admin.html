<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin LeveCRM</title>
<style>
body{font-family:Arial,sans-serif;background:#f5f5f5;padding:20px;margin:0}
.box{background:#fff;padding:20px;border-radius:10px;max-width:900px;margin:20px auto;box-shadow:0 2px 10px rgba(0,0,0,.08)}
h1,h2,h3{margin-top:0}
.row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
input{padding:10px;border:1px solid #ccc;border-radius:8px;min-width:160px}
button{padding:10px 15px;background:#2d5cff;color:#fff;border:none;border-radius:8px;cursor:pointer}
button:hover{filter:brightness(1.05)}
.item{padding:10px;border-bottom:1px solid #ddd}
.muted{color:#666;font-size:13px}
.err{color:#b00020;font-size:13px;margin-top:8px}
.ok{color:#0a7d32;font-size:13px;margin-top:8px}
</style>
</head>
<body>
<div class="box">
  <h2>Painel Admin LeveCRM</h2>
  <p class="muted">Gerencie os acessos do sistema.</p>

  <h3>Criar usuário</h3>
  <div class="row">
    <input id="nome" placeholder="Nome">
    <input id="u" placeholder="Email / usuário">
    <input id="p" placeholder="Senha">
    <input id="c" placeholder="Chave">
    <button onclick="criar()">Criar</button>
  </div>
  <div class="row">
    <input id="dias" type="number" value="30" placeholder="Dias">
  </div>
  <div id="msg"></div>

  <h3 style="margin-top:24px">Lista de usuários</h3>
  <div id="lista" class="muted">Carregando...</div>
</div>

<script>
const URL = "https://lnrbpiklzymblpyrobwx.supabase.co/rest/v1/crm_access_users";
const KEY = "sb_publishable_KXVbF3c7RGFXVTtfYmrzzg_dMK04Q9q";

function showMsg(text, ok=false){
  const el = document.getElementById("msg");
  el.className = ok ? "ok" : "err";
  el.textContent = text;
}

async function listar() {
  try{
    const res = await fetch(URL + "?select=nome,usuario,chave,status,vencimento_em,is_admin&order=criado_em.desc", {
      headers: {
        apikey: KEY,
        Authorization: "Bearer " + KEY
      }
    });
    const data = await res.json();

    if(!Array.isArray(data)){
      document.getElementById("lista").innerHTML = '<div class="err">Erro ao listar usuários.</div>';
      return;
    }

    let html = "";
    data.forEach(i => {
      html += `<div class="item">
        <strong>${i.nome || "(sem nome)"}</strong><br>
        Usuário: ${i.usuario}<br>
        Chave: ${i.chave}<br>
        Status: ${i.status} | Admin: ${i.is_admin ? "sim" : "não"}<br>
        Vencimento: ${i.vencimento_em || "-"}
      </div>`;
    });

    document.getElementById("lista").innerHTML = html || '<div class="muted">Nenhum usuário encontrado.</div>';
  }catch(e){
    document.getElementById("lista").innerHTML = '<div class="err">Erro de conexão ao listar usuários.</div>';
  }
}

async function criar() {
  const nome = document.getElementById("nome").value.trim();
  const usuario = document.getElementById("u").value.trim();
  const senha = document.getElementById("p").value.trim();
  const chave = document.getElementById("c").value.trim();
  const dias = Number(document.getElementById("dias").value || 30);

  if(!usuario || !senha || !chave){
    showMsg("Preencha usuário, senha e chave.");
    return;
  }

  try{
    const vencimento = new Date(Date.now() + dias*24*60*60*1000).toISOString();

    const res = await fetch(URL, {
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        apikey:KEY,
        Authorization:"Bearer " + KEY,
        "Prefer":"return=representation"
      },
      body: JSON.stringify([{
        nome,
        usuario,
        senha,
        chave,
        status:"ativo",
        is_admin:false,
        vencimento_em:vencimento
      }])
    });

    if(!res.ok){
      const txt = await res.text();
      showMsg("Erro ao criar usuário: " + txt);
      return;
    }

    showMsg("Usuário criado com sucesso.", true);
    document.getElementById("nome").value = "";
    document.getElementById("u").value = "";
    document.getElementById("p").value = "";
    document.getElementById("c").value = "";
    document.getElementById("dias").value = "30";
    listar();
  }catch(e){
    showMsg("Erro de conexão ao criar usuário.");
  }
}

listar();
</script>
</body>
</html>
