<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin Comercial — LeveCRM</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f172a;--card:#111c31;--card2:#1e293b;--line:#334155;--text:#e2e8f0;--muted:#94a3b8;
  --blue:#2563eb;--green:#22c55e;--red:#ef4444;--yellow:#f59e0b;--gray:#64748b;
}
body{font-family:system-ui,-apple-system,Segoe UI,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
#loginWrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
#loginBox{background:var(--card2);border:1px solid var(--line);border-radius:18px;padding:36px;width:100%;max-width:390px;box-shadow:0 24px 80px rgba(0,0,0,.3)}
#loginBox h2{text-align:center;margin-bottom:22px;font-size:1.35rem}
#loginBox input{width:100%;padding:12px 14px;margin-bottom:14px;background:#0b1220;border:1px solid var(--line);border-radius:10px;color:var(--text)}
#loginBox button{width:100%;padding:12px;border:0;border-radius:10px;background:var(--blue);color:#fff;font-weight:900;cursor:pointer}
#loginMsg{margin-top:14px;text-align:center;color:#fca5a5;font-size:.9rem;min-height:20px}
#adminWrap{display:none;padding:24px;max-width:1480px;margin:0 auto}
header{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--line)}
h1{font-size:1.35rem}.muted{color:var(--muted)}
.btn{border:0;border-radius:10px;padding:9px 14px;font-weight:900;cursor:pointer;font-size:.86rem;white-space:nowrap}
.btn-primary{background:var(--blue);color:#fff}.btn-green{background:var(--green);color:#052e16}.btn-red{background:var(--red);color:#fff}.btn-yellow{background:var(--yellow);color:#291500}.btn-gray{background:#334155;color:var(--text)}
.btn-sm{padding:7px 10px;font-size:.78rem}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px}
.stat b{display:block;font-size:1.8rem;margin-top:5px}.stat span{font-size:.85rem;color:var(--muted);font-weight:800}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.toolbar input,.toolbar select{padding:10px 12px;background:var(--card2);border:1px solid var(--line);border-radius:10px;color:var(--text)}
.toolbar input{width:280px}
.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:16px;background:#0b1220}
table{width:100%;border-collapse:collapse;font-size:.88rem}
th{background:var(--card2);padding:12px;text-align:left;color:#b6c3d6;border-bottom:1px solid var(--line);white-space:nowrap}
td{padding:12px;border-bottom:1px solid #17233a;vertical-align:middle}
tr:hover td{background:#14213a}
.badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;font-size:.76rem;font-weight:950}
.badge-active{background:#14532d;color:#86efac}.badge-trial{background:#713f12;color:#fde68a}.badge-expired{background:#7f1d1d;color:#fecaca}.badge-blocked{background:#374151;color:#d1d5db}
.actions{display:flex;gap:7px;flex-wrap:wrap}
.card-mobile{display:none}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:20;align-items:center;justify-content:center;padding:14px}
.overlay.open{display:flex}
.modal{background:var(--card2);border:1px solid var(--line);border-radius:16px;padding:24px;width:100%;max-width:520px;max-height:92vh;overflow:auto}
.modal h3{margin-bottom:18px;font-size:1.12rem}
.field{margin-bottom:14px}.field label{display:block;margin-bottom:6px;color:var(--muted);font-size:.82rem;font-weight:800}
.field input,.field select,.field textarea{width:100%;padding:10px 12px;background:#0b1220;border:1px solid var(--line);border-radius:10px;color:var(--text)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:18px}
.msg{padding:10px 14px;border-radius:10px;font-size:.88rem;margin-bottom:14px}
.msg-error{background:#7f1d1d;color:#fecaca}.msg-success{background:#14532d;color:#bbf7d0}
.code{font-family:ui-monospace,Consolas,monospace;background:#0b1220;border:1px solid var(--line);border-radius:10px;padding:12px;color:#86efac;word-break:break-all}
.expiring{color:#fde68a;font-weight:900}.expiredText{color:#fecaca;font-weight:900}
@media(max-width:820px){
  #adminWrap{padding:14px} header{flex-direction:column;align-items:flex-start}
  .stats{grid-template-columns:repeat(2,1fr)}
  .toolbar{display:grid;grid-template-columns:1fr;width:100%}.toolbar input,.toolbar select,.toolbar button{width:100%}
  .table-wrap{display:none}.card-mobile{display:grid;gap:12px}
  .user-card{background:#0b1220;border:1px solid var(--line);border-radius:16px;padding:14px}
  .user-card h3{font-size:1rem;margin-bottom:4px}.user-card p{color:var(--muted);font-size:.86rem;margin-bottom:8px}
  .actions .btn{flex:1}
  .field-row{grid-template-columns:1fr}
  .modal-footer{position:sticky;bottom:-24px;background:var(--card2);padding-top:12px}
}
</style>
</head>
<body>
<div id="loginWrap">
  <div id="loginBox">
    <h2>Admin Comercial LeveCRM</h2>
    <input id="loginEmail" type="email" placeholder="E-mail admin" autocomplete="email">
    <input id="loginPass" type="password" placeholder="Senha" autocomplete="current-password">
    <button onclick="adminLogin()">Entrar</button>
    <p id="loginMsg"></p>
  </div>
</div>

<div id="adminWrap">
  <header>
    <div>
      <h1>Admin Comercial LeveCRM</h1>
      <div id="adminEmail" class="muted" style="font-size:.86rem;margin-top:4px"></div>
    </div>
    <button class="btn btn-gray" onclick="adminLogout()">Sair</button>
  </header>

  <section class="stats">
    <div class="stat"><span>Clientes ativos</span><b id="stActive">0</b></div>
    <div class="stat"><span>Em teste</span><b id="stTrial">0</b></div>
    <div class="stat"><span>Vencidos</span><b id="stExpired">0</b></div>
    <div class="stat"><span>Bloqueados</span><b id="stBlocked">0</b></div>
  </section>

  <div class="toolbar">
    <button class="btn btn-primary" onclick="loadProfiles()">Atualizar</button>
    <button class="btn btn-green" onclick="openKeyModal()">Gerar chave</button>
    <input id="searchInput" type="text" placeholder="Buscar nome ou e-mail..." oninput="renderProfiles()">
    <select id="statusFilter" onchange="renderProfiles()">
      <option value="">Todos os status</option>
      <option value="active">Ativos</option>
      <option value="trial">Teste</option>
      <option value="expired">Vencidos</option>
      <option value="blocked">Bloqueados</option>
    </select>
  </div>

  <div id="globalMsg"></div>

  <div class="table-wrap">
    <table>
      <thead><tr>
        <th>Cliente</th><th>E-mail</th><th>Status</th><th>Teste até</th><th>Licença até</th><th>Ações rápidas</th>
      </tr></thead>
      <tbody id="profilesBody"></tbody>
    </table>
  </div>
  <div id="mobileCards" class="card-mobile"></div>
</div>

<div class="overlay" id="profileModal">
  <div class="modal">
    <h3>Editar acesso</h3>
    <div id="modalMsg"></div>
    <input type="hidden" id="pId">
    <div class="field"><label>Nome</label><input id="pNome" type="text"></div>
    <div class="field"><label>E-mail</label><input id="pEmail" type="email" disabled></div>
    <div class="field-row">
      <div class="field"><label>Status</label>
        <select id="pStatus">
          <option value="trial">trial</option><option value="active">active</option><option value="expired">expired</option><option value="blocked">blocked</option>
        </select>
      </div>
      <div class="field"><label>Licença até</label><input id="pLicenseEnd" type="datetime-local"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-gray" onclick="closeProfileModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveProfile()">Salvar</button>
    </div>
  </div>
</div>

<div class="overlay" id="keyModal">
  <div class="modal">
    <h3>Gerar chave de licença</h3>
    <div id="keyMsg"></div>
    <div class="field"><label>Dias de licença</label><input id="keyDays" type="number" min="1" value="365"></div>
    <div class="field"><label>Notas</label><input id="keyNotes" type="text" placeholder="Ex: cliente / plano"></div>
    <div id="keyResult" class="code" style="display:none"></div>
    <div class="modal-footer">
      <button class="btn btn-gray" onclick="closeKeyModal()">Fechar</button>
      <button class="btn btn-primary" onclick="generateKey()">Gerar</button>
    </div>
  </div>
</div>

<script>
const SB_URL='https://lnrbpiklzymblpyrobwx.supabase.co';
const SB_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxucmJwaWtsenltYmxweXJvYnd4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA4MjY0MjcsImV4cCI6MjA4NjQwMjQyN30.ybNh5WhAPWgAMW3gLKrxCGFfIl_9oH31Ajv8qqjtelo';
const ADMIN_EMAILS=['sanchaikraemer3@gmail.com'];
const sb=window.supabase.createClient(SB_URL,SB_ANON_KEY);
let PROFILES=[];

function norm(v){return String(v||'').trim().toLowerCase()}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;')}
function toLocalInput(value){if(!value)return'';const d=new Date(value);const p=n=>String(n).padStart(2,'0');return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`}
function brDate(v){return v?new Date(v).toLocaleDateString('pt-BR'):'—'}
function showGlobal(text,type='success'){document.getElementById('globalMsg').innerHTML=`<div class="msg msg-${type}">${esc(text)}</div>`;setTimeout(()=>document.getElementById('globalMsg').innerHTML='',4200)}
function setMsg(id,text,type='error'){document.getElementById(id).innerHTML=`<div class="msg msg-${type}">${esc(text)}</div>`}

async function init(){
  const {data}=await sb.auth.getSession();
  if(data?.session?.user?.email && ADMIN_EMAILS.includes(norm(data.session.user.email)))showAdmin(data.session.user.email);
}
async function adminLogin(){
  const email=norm(document.getElementById('loginEmail').value), password=document.getElementById('loginPass').value;
  const el=document.getElementById('loginMsg');el.textContent='';
  if(!email||!password){el.textContent='Preencha e-mail e senha.';return}
  const {data,error}=await sb.auth.signInWithPassword({email,password});
  if(error){el.textContent='E-mail ou senha não conferem.';return}
  if(!ADMIN_EMAILS.includes(norm(data.session.user.email))){await sb.auth.signOut();el.textContent='Acesso negado.';return}
  showAdmin(data.session.user.email);
}
async function adminLogout(){await sb.auth.signOut();location.reload()}
function showAdmin(email){document.getElementById('loginWrap').style.display='none';document.getElementById('adminWrap').style.display='block';document.getElementById('adminEmail').textContent=email;loadProfiles()}

async function loadProfiles(){
  const loading='<tr><td colspan="6" style="text-align:center;color:#94a3b8;padding:24px">Carregando...</td></tr>';
  document.getElementById('profilesBody').innerHTML=loading;document.getElementById('mobileCards').innerHTML='';
  const {data,error}=await sb.from('profiles').select('*').order('created_at',{ascending:false});
  if(error){document.getElementById('profilesBody').innerHTML=`<tr><td colspan="6" style="color:#fecaca;padding:24px">Erro: ${esc(error.message)}</td></tr>`;return}
  PROFILES=data||[];renderProfiles();
}
function statusOf(p){return p.account_status||'trial'}
function updateStats(){
  document.getElementById('stActive').textContent=PROFILES.filter(p=>statusOf(p)==='active').length;
  document.getElementById('stTrial').textContent=PROFILES.filter(p=>statusOf(p)==='trial').length;
  document.getElementById('stExpired').textContent=PROFILES.filter(p=>statusOf(p)==='expired').length;
  document.getElementById('stBlocked').textContent=PROFILES.filter(p=>statusOf(p)==='blocked').length;
}
function licenseClass(v){
  if(!v)return '';
  const days=(new Date(v)-new Date())/86400000;
  if(days<0)return 'expiredText';
  if(days<=7)return 'expiring';
  return '';
}
function actionButtons(p){
  return `<div class="actions">
    <button class="btn btn-green btn-sm" onclick="quickAccess('${esc(p.id)}',30)">+30 dias</button>
    <button class="btn btn-green btn-sm" onclick="quickAccess('${esc(p.id)}',365)">+1 ano</button>
    <button class="btn btn-yellow btn-sm" onclick="setStatus('${esc(p.id)}','trial')">Teste 7d</button>
    <button class="btn btn-red btn-sm" onclick="setStatus('${esc(p.id)}','blocked')">Bloquear</button>
    <button class="btn btn-gray btn-sm" onclick="openProfileModal('${esc(p.id)}')">Editar</button>
  </div>`
}
function renderProfiles(){
  updateStats();
  const q=norm(document.getElementById('searchInput').value), sf=document.getElementById('statusFilter').value;
  const rows=PROFILES.filter(p=>(!sf||statusOf(p)===sf)&&(norm(p.nome).includes(q)||norm(p.email).includes(q)));
  const tbody=document.getElementById('profilesBody'), cards=document.getElementById('mobileCards');
  if(!rows.length){
    tbody.innerHTML='<tr><td colspan="6" style="text-align:center;color:#64748b;padding:24px">Nenhum usuário encontrado.</td></tr>';cards.innerHTML='<div class="user-card"><p>Nenhum usuário encontrado.</p></div>';return;
  }
  tbody.innerHTML=rows.map(p=>`<tr>
    <td><b>${esc(p.nome||'Sem nome')}</b></td>
    <td>${esc(p.email||'')}</td>
    <td><span class="badge badge-${esc(statusOf(p))}">${esc(statusOf(p))}</span></td>
    <td>${brDate(p.trial_end)}</td>
    <td class="${licenseClass(p.license_end)}">${brDate(p.license_end)}</td>
    <td>${actionButtons(p)}</td>
  </tr>`).join('');
  cards.innerHTML=rows.map(p=>`<div class="user-card">
    <h3>${esc(p.nome||'Sem nome')}</h3><p>${esc(p.email||'')}</p>
    <p><span class="badge badge-${esc(statusOf(p))}">${esc(statusOf(p))}</span></p>
    <p>Teste: ${brDate(p.trial_end)} · Licença: <span class="${licenseClass(p.license_end)}">${brDate(p.license_end)}</span></p>
    ${actionButtons(p)}
  </div>`).join('');
}
async function updateProfile(id,payload,ok='Atualizado.'){
  const {error}=await sb.from('profiles').update({...payload,updated_at:new Date().toISOString()}).eq('id',id);
  if(error){showGlobal('Erro: '+error.message,'error');return false}
  showGlobal(ok,'success');await loadProfiles();return true;
}
async function quickAccess(id,days){
  const p=PROFILES.find(x=>String(x.id)===String(id)); if(!p)return;
  const base=p.license_end?new Date(p.license_end):new Date();
  if(base < new Date()) base.setTime(Date.now());
  base.setDate(base.getDate()+days);
  await updateProfile(id,{account_status:'active',license_end:base.toISOString()},`Acesso liberado por ${days} dias.`);
}
async function setStatus(id,status){
  const payload={account_status:status};
  if(status==='trial'){const d=new Date();d.setDate(d.getDate()+7);payload.trial_end=d.toISOString()}
  await updateProfile(id,payload,status==='blocked'?'Usuário bloqueado.':'Status atualizado.');
}
function openProfileModal(id){
  const p=PROFILES.find(x=>String(x.id)===String(id)); if(!p)return;
  document.getElementById('modalMsg').innerHTML='';
  document.getElementById('pId').value=p.id;document.getElementById('pNome').value=p.nome||'';document.getElementById('pEmail').value=p.email||'';
  document.getElementById('pStatus').value=statusOf(p);document.getElementById('pLicenseEnd').value=toLocalInput(p.license_end);
  document.getElementById('profileModal').classList.add('open');
}
function closeProfileModal(){document.getElementById('profileModal').classList.remove('open')}
async function saveProfile(){
  const id=document.getElementById('pId').value;
  const payload={nome:document.getElementById('pNome').value.trim(),account_status:document.getElementById('pStatus').value,license_end:document.getElementById('pLicenseEnd').value?new Date(document.getElementById('pLicenseEnd').value).toISOString():null};
  const ok=await updateProfile(id,payload,'Usuário atualizado.');
  if(ok)closeProfileModal();
}
function openKeyModal(){document.getElementById('keyMsg').innerHTML='';document.getElementById('keyResult').style.display='none';document.getElementById('keyResult').textContent='';document.getElementById('keyDays').value='365';document.getElementById('keyNotes').value='';document.getElementById('keyModal').classList.add('open')}
function closeKeyModal(){document.getElementById('keyModal').classList.remove('open')}
async function generateKey(){
  const days=parseInt(document.getElementById('keyDays').value), notes=document.getElementById('keyNotes').value.trim();
  if(!days||days<1){setMsg('keyMsg','Informe os dias.','error');return}
  const code='LVK-'+Array.from(crypto.getRandomValues(new Uint8Array(12))).map(b=>b.toString(16).padStart(2,'0')).join('').toUpperCase().slice(0,16);
  const {error}=await sb.from('license_keys').insert({code,duration_days:days,is_active:true,notes:notes||null,created_at:new Date().toISOString()});
  if(error){setMsg('keyMsg','Erro: '+error.message,'error');return}
  document.getElementById('keyResult').textContent=code;document.getElementById('keyResult').style.display='block';setMsg('keyMsg','Chave criada com sucesso.','success');
}
document.getElementById('loginPass').addEventListener('keydown',e=>{if(e.key==='Enter')adminLogin()});
init();
</script>
</body>
</html>
