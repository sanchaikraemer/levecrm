<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LeveCRM</title>

<style>
body {
  font-family: Arial;
  margin:0;
  background:#0b1f3a;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box {
  background:#fff;
  padding:30px;
  border-radius:12px;
  width:320px;
}

input {
  width:100%;
  padding:10px;
  margin-bottom:10px;
}

button {
  width:100%;
  padding:12px;
  background:#2d5cff;
  color:#fff;
  border:none;
  cursor:pointer;
}

.erro {
  color:red;
  font-size:13px;
}
</style>
</head>

<body>

<div class="box">
<h2>Acesso ao sistema</h2>

<input id="user" placeholder="Usuário ou email">
<input id="pass" type="password" placeholder="Senha">
<input id="key" placeholder="Chave de acesso">

<button onclick="login()">Entrar</button>

<div id="msg" class="erro"></div>
</div>

<script>
const SB_URL = "https://lnrbpiklzymblpyrobwx.supabase.co";
const SB_KEY = "sb_publishable_KXVbF3c7RGFXVTtfYmrzzg_dMK04Q9q";

async function login() {
  const user = document.getElementById("user").value;
  const pass = document.getElementById("pass").value;
  const key = document.getElementById("key").value;

  const res = await fetch(`${SB_URL}/rest/v1/crm_access_users?usuario=eq.${user}&senha=eq.${pass}&chave=eq.${key}`, {
    headers: {
      "apikey": SB_KEY,
      "Authorization": `Bearer ${SB_KEY}`
    }
  });

  const data = await res.json();

  if (data.length > 0) {
    window.location.href = "admin.html";
  } else {
    document.getElementById("msg").innerText = "Dados inválidos ou sem acesso";
  }
}
</script>

</body>
</html>
