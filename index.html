<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>LeveCRM</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#0D1B2E,#1B2E4B);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
}
.box{
  background:#fff;border-radius:20px;padding:40px;width:100%;max-width:420px;
  box-shadow:0 20px 60px rgba(0,0,0,.3);
}
.logo{
  width:80px;height:80px;background:linear-gradient(135deg,#1E3A6B,#4A90D9);
  border-radius:50%;margin:0 auto 16px;display:flex;align-items:center;
  justify-content:center;color:#fff;font-size:42px;font-weight:900;
}
h1{font-size:28px;font-weight:800;color:#1B2E4B;text-align:center;margin-bottom:8px}
.sub{color:#64748B;font-size:14px;text-align:center;margin-bottom:32px}
.tabs{display:flex;gap:8px;margin-bottom:24px;border-bottom:2px solid #E2E8F0}
.tab{
  background:transparent;border:0;border-bottom:2px solid transparent;
  padding:10px 16px;color:#64748B;font-size:14px;font-weight:600;
  cursor:pointer;margin-bottom:-2px;font-family:inherit;
}
.tab.active{color:#4A90D9;border-bottom-color:#4A90D9}
label{display:block;font-size:13px;font-weight:600;color:#334155;margin-bottom:6px}
input{
  width:100%;padding:12px;border:1.5px solid #D1D5DB;border-radius:10px;
  font-size:14px;margin-bottom:16px;font-family:inherit;
}
button[type="submit"]{
  width:100%;padding:14px;background:linear-gradient(135deg,#1E3A6B,#4A90D9);
  color:#fff;border:0;border-radius:12px;font-size:15px;font-weight:700;
  cursor:pointer;font-family:inherit;
}
.err{
  display:none;margin-top:12px;padding:10px;background:#FEE2E2;
  border:1px solid #FCA5A5;border-radius:8px;color:#991B1B;font-size:13px;
}
.hide{display:none}
.ok{background:#D1FAE5;border:1px solid #6EE7B7;color:#065F46;padding:16px;border-radius:12px;text-align:center;margin-top:16px}
</style>
</head>
<body>

<div class="box" id="auth">
  <div class="logo">L</div>
  <h1>LeveCRM</h1>
  <p class="sub">Sistema Multi-Tenant</p>
  
  <div class="tabs">
    <button class="tab active" onclick="showTab(0)">Entrar</button>
    <button class="tab" onclick="showTab(1)">Criar</button>
  </div>
  
  <form id="f1" onsubmit="login(event)">
    <label>Email</label>
    <input type="email" id="e1" required>
    <label>Senha</label>
    <input type="password" id="p1" required>
    <button type="submit">Entrar</button>
    <div class="err" id="err1"></div>
  </form>
  
  <form id="f2" class="hide" onsubmit="signup(event)">
    <label>Nome</label>
    <input type="text" id="n2" required>
    <label>Email</label>
    <input type="email" id="e2" required>
    <label>Senha</label>
    <input type="password" id="p2" required minlength="6">
    <button type="submit">Criar Conta</button>
    <div class="err" id="err2"></div>
  </form>
</div>

<div class="box hide" id="ok">
  <div class="logo">✅</div>
  <h1>SUCESSO!</h1>
  <p class="sub">Login funcionou!</p>
  <div class="ok">
    <strong>Email:</strong> <span id="ue"></span><br>
    <strong>ID:</strong> <span id="ui"></span>
  </div>
  <button onclick="out()" style="width:100%;padding:12px;margin-top:20px;background:#F3F4F6;border:1px solid #D1D5DB;border-radius:10px;cursor:pointer">Sair</button>
</div>

<script>
const SB_URL='https://lnrbpiklzymblpyrobwx.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxucmJwaWtsenltYmxweXJvYnd4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA4MjY0MjcsImV4cCI6MjA4NjQwMjQyN30.ybNh5WhAPWgAMW3gLKrxCGFfIl_9oH31Ajv8qqjtelo';

const sb=window.supabase.createClient(SB_URL,SB_KEY);

sb.auth.getSession().then(({data:{session}})=>{
  if(session){show(session.user)}
});

function showTab(n){
  document.querySelectorAll('.tab').forEach((t,i)=>{
    t.className=i===n?'tab active':'tab';
  });
  document.getElementById('f1').className=n===0?'':'hide';
  document.getElementById('f2').className=n===1?'':'hide';
}

async function login(e){
  e.preventDefault();
  const em=document.getElementById('e1').value;
  const pw=document.getElementById('p1').value;
  const {data,error}=await sb.auth.signInWithPassword({email:em,password:pw});
  if(error){
    document.getElementById('err1').textContent=error.message;
    document.getElementById('err1').style.display='block';
  }else{
    show(data.user);
  }
}

async function signup(e){
  e.preventDefault();
  const nm=document.getElementById('n2').value;
  const em=document.getElementById('e2').value;
  const pw=document.getElementById('p2').value;
  const {data,error}=await sb.auth.signUp({email:em,password:pw,options:{data:{nome:nm}}});
  if(error){
    document.getElementById('err2').textContent=error.message;
    document.getElementById('err2').style.display='block';
  }else{
    alert('Conta criada!');
    showTab(0);
  }
}

function show(u){
  document.getElementById('auth').className='box hide';
  document.getElementById('ok').className='box';
  document.getElementById('ue').textContent=u.email;
  document.getElementById('ui').textContent=u.id;
}

async function out(){
  await sb.auth.signOut();
  location.reload();
}
</script>

</body>
</html>
