<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin — LeveCRM</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}

/* LOGIN */
#loginWrap{display:flex;align-items:center;justify-content:center;min-height:100vh}
#loginBox{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:40px;width:100%;max-width:380px}
#loginBox h2{font-size:1.4rem;margin-bottom:24px;color:#f8fafc;text-align:center}
#loginBox input{display:block;width:100%;padding:10px 14px;margin-bottom:14px;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#e2e8f0;font-size:0.95rem}
#loginBox input:focus{outline:none;border-color:#6366f1}
#loginBox button{width:100%;padding:11px;background:#6366f1;color:#fff;border:none;border-radius:8px;font-size:1rem;cursor:pointer;font-weight:600}
#loginBox button:hover{background:#4f46e5}
#loginMsg{margin-top:12px;color:#f87171;font-size:0.88rem;text-align:center;min-height:20px}

/* ADMIN */
#adminWrap{display:none;padding:24px}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid #334155}
header h1{font-size:1.3rem;color:#f8fafc}
.btn{padding:8px 16px;border:none;border-radius:7px;cursor:pointer;font-size:0.88rem;font-weight:600}
.btn-primary{background:#6366f1;color:#fff}.btn-primary:hover{background:#4f46e5}
.btn-danger{background:#ef4444;color:#fff}.btn-danger:hover{background:#dc2626}
.btn-secondary{background:#334155;color:#e2e8f0}.btn-secondary:hover{background:#475569}
.btn-sm{padding:5px 10px;font-size:0.8rem}
.btn-green{background:#22c55e;color:#fff}.btn-green:hover{background:#16a34a}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px;align-items:center}
.toolbar input[type=text]{padding:8px 12px;background:#1e293b;border:1px solid #334155;border-radius:7px;color:#e2e8f0;font-size:0.88rem;width:220px}
.toolbar input:focus{outline:none;border-color:#6366f1}
.table-wrap{overflow-x:auto;border-radius:10px;border:1px solid #334155}
table{width:100%;border-collapse:collapse;font-size:0.87rem}
th{background:#1e293b;padding:10px 12px;text-align:left;color:#94a3b8;font-weight:600;border-bottom:1px solid #334155}
td{padding:9px 12px;border-bottom:1px solid #1e293b;vertical-align:middle}
tr:hover td{background:#1e293b}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:0.78rem;font-weight:600}
.badge-active{background:#166534;color:#86efac}
.badge-trial{background:#854d0e;color:#fde68a}
.badge-expired{background:#7f1d1d;color:#fca5a5}
.badge-blocked{background:#374151;color:#9ca3af}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:28px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.modal h3{font-size:1.1rem;margin-bottom:20px;color:#f8fafc}
.field{margin-bottom:14px}
.field label{display:block;font-size:0.82rem;color:#94a3b8;margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;padding:9px 12px;background:#0f172a;border:1px solid #334155;border-radius:7px;color:#e2e8f0;font-size:0.9rem}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:#6366f1}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
.msg{padding:10px 14px;border-radius:7px;font-size:0.87rem;margin-bottom:14px}
.msg-error{background:#7f1d1d;color:#fca5a5}
.msg-success{background:#166534;color:#86efac}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginWrap">
  <div id="loginBox">
    <h2>Admin LeveCRM</h2>
    <input id="loginEmail" type="email" placeholder="Email" autocomplete="email">
    <input id="loginPass" type="password" placeholder="Senha" autocomplete="current-password">
    <button onclick="adminLogin()">Entrar</button>
    <p id="loginMsg"></p>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="adminWrap">
  <header>
    <h1>Admin LeveCRM</h1>
    <div style="display:flex;gap:10px;align-items:center">
      <span id="adminEmail" style="font-size:0.85rem;color:#64748b"></span>
      <button class="btn btn-secondary" onclick="adminLogout()">Sair</button>
    </div>
  </header>
  <div class="toolbar">
    <button class="btn btn-primary" onclick="openModal()">+ Novo usuário</button>
    <button class="btn btn-danger" onclick="deleteSelected()">Excluir selecionados</button>
    <button class="btn btn-green" onclick="openKeyModal()">Gerar chave de licença</button>
    <input type="text" id="searchInput" placeholder="Buscar nome ou usuário..." oninput="renderTable()">
  </div>
  <div id="globalMsg"></div>
  <div class="table-wrap">
    <table>
      <thead><tr>
        <th><input type="checkbox" id="checkAll" onchange="toggleAll(this)"></th>
        <th>Nome</th><th>Usuário</th><th>Status</th><th>Vencimento</th><th>Admin</th><th>Ações</th>
      </tr></thead>
      <tbody id="usersBody"></tbody>
    </table>
  </div>
</div>

<!-- MODAL USUÁRIO -->
<div class="overlay" id="userModal">
  <div class="modal">
    <h3 id="modalTitle">Novo usuário</h3>
    <div id="modalMsg"></div>
    <input type="hidden" id="userId">
    <div class="field-row">
      <div class="field"><label>Nome</label><input id="uNome" type="text"></div>
      <div class="field"><label>Usuário</label><input id="uUsuario" type="text"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Senha</label><input id="uSenha" type="text" placeholder="Deixe em branco para manter"></div>
      <div class="field"><label>Chave</label><input id="uChave" type="text"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Status</label>
        <select id="uStatus">
          <option value="trial">trial</option>
          <option value="active">active</option>
          <option value="expired">expired</option>
          <option value="blocked">blocked</option>
        </select>
      </div>
      <div class="field"><label>Vencimento</label><input id="uVencimento" type="datetime-local"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Data início</label><input id="uDataInicio" type="date"></div>
      <div class="field" style="display:flex;align-items:flex-end;padding-bottom:4px">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer"><input id="uIsAdmin" type="checkbox"> Admin</label>
      </div>
    </div>
    <div class="field"><label>Observação</label><textarea id="uObs" rows="2"></textarea></div>
    <div class="field"><label>Adicionar dias</label>
      <div style="display:flex;gap:8px">
        <input id="addDays" type="number" min="1" placeholder="Ex: 30" style="width:100px">
        <button class="btn btn-secondary btn-sm" onclick="addDaysBtn()">Adicionar</button>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveUser()">Salvar</button>
    </div>
  </div>
</div>

<!-- MODAL CHAVE -->
<div class="overlay" id="keyModal">
  <div class="modal">
    <h3>Gerar chave de licença</h3>
    <div id="keyMsg"></div>
    <div class="field"><label>Dias de licença</label><input id="keyDays" type="number" min="1" value="365"></div>
    <div class="field"><label>Notas (opcional)</label><input id="keyNotes" type="text" placeholder="Ex: Cliente XYZ"></div>
    <div id="keyResult" style="font-family:monospace;padding:10px;background:#0f172a;border-radius:6px;display:none;word-break:break-all;color:#86efac"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeKeyModal()">Fechar</button>
      <button class="btn btn-primary" onclick="generateKey()">Gerar</button>
    </div>
  </div>
</div>

<script>
const SB_URL='https://lnrbpiklzymblpyrobwx.supabase.co';
const SB_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxucmJwaWtsenltYmxweXJvYnd4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA4MjY0MjcsImV4cCI6MjA4NjQwMjQyN30.ybNh5WhAPWgAMW3gLKrxCGFfIl_9oH31Ajv8qqjtelo';
const ADMIN_EMAILS=['sanchaikraemer3@gmail.com'];
const sb=window.supabase.createClient(SB_URL,SB_ANON_KEY);
let ALL_USERS=[];

async function init(){
  const{data:{session}}=await sb.auth.getSession();
  if(session&&ADMIN_EMAILS.includes(session.user.email))showAdmin(session.user.email);
}

async function adminLogin(){
  const email=document.getElementById('loginEmail').value.trim();
  const pass=document.getElementById('loginPass').value;
  const msg=document.getElementById('loginMsg');
  msg.textContent='';
  if(!email||!pass){msg.textContent='Preencha email e senha.';return;}
  const{error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){msg.textContent='Email ou senha incorretos.';return;}
  if(!ADMIN_EMAILS.includes(email)){await sb.auth.signOut();msg.textContent='Acesso negado.';return;}
  showAdmin(email);
}

async function adminLogout(){await sb.auth.signOut();location.reload();}

function showAdmin(email){
  document.getElementById('loginWrap').style.display='none';
  document.getElementById('adminWrap').style.display='';
  document.getElementById('adminEmail').textContent=email;
  loadUsers();
}

async function loadUsers(){
  const{data,error}=await sb.from('crm_access_users').select('*').order('criado_em',{ascending:false});
  if(error){showGlobalMsg('Erro: '+error.message,'error');return;}
  ALL_USERS=data||[];renderTable();
}

function renderTable(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const rows=ALL_USERS.filter(u=>(u.nome||'').toLowerCase().includes(q)||(u.usuario||'').toLowerCase().includes(q));
  const tbody=document.getElementById('usersBody');
  if(!rows.length){tbody.innerHTML='<tr><td colspan="7" style="text-align:center;color:#64748b;padding:24px">Nenhum usuário encontrado.</td></tr>';return;}
  tbody.innerHTML=rows.map(u=>`
    <tr>
      <td><input type="checkbox" class="row-check" data-id="${u.id}"></td>
      <td>${esc(u.nome)}</td><td>${esc(u.usuario)}</td>
      <td><span class="badge badge-${u.status}">${u.status}</span></td>
      <td style="font-size:0.82rem">${u.vencimento_em?new Date(u.vencimento_em).toLocaleDateString('pt-BR'):'—'}</td>
      <td>${u.is_admin?'✓':''}</td>
      <td style="display:flex;gap:6px">
        <button class="btn btn-secondary btn-sm" onclick="openModal('${u.id}')">Editar</button>
        <button class="btn btn-danger btn-sm" onclick="deleteSingle('${u.id}')">Excluir</button>
      </td>
    </tr>`).join('');
}

function toggleAll(cb){document.querySelectorAll('.row-check').forEach(c=>c.checked=cb.checked);}
function selectedIds(){return[...document.querySelectorAll('.row-check:checked')].map(c=>c.dataset.id);}

async function deleteSelected(){
  const ids=selectedIds();
  if(!ids.length){alert('Selecione ao menos um usuário.');return;}
  if(!confirm(`Excluir ${ids.length} usuário(s)?`))return;
  const{error}=await sb.from('crm_access_users').delete().in('id',ids);
  if(error){showGlobalMsg('Erro: '+error.message,'error');return;}
  showGlobalMsg(`${ids.length} usuário(s) excluído(s).`,'success');loadUsers();
}

async function deleteSingle(id){
  if(!confirm('Excluir este usuário?'))return;
  const{error}=await sb.from('crm_access_users').delete().eq('id',id);
  if(error){showGlobalMsg('Erro: '+error.message,'error');return;}
  showGlobalMsg('Usuário excluído.','success');loadUsers();
}

function openModal(id){
  document.getElementById('modalMsg').innerHTML='';
  document.getElementById('addDays').value='';
  if(id){
    const u=ALL_USERS.find(x=>x.id===id);if(!u)return;
    document.getElementById('modalTitle').textContent='Editar usuário';
    document.getElementById('userId').value=u.id;
    document.getElementById('uNome').value=u.nome||'';
    document.getElementById('uUsuario').value=u.usuario||'';
    document.getElementById('uSenha').value='';
    document.getElementById('uChave').value=u.chave||'';
    document.getElementById('uStatus').value=u.status||'trial';
    document.getElementById('uVencimento').value=u.vencimento_em?u.vencimento_em.slice(0,16):'';
    document.getElementById('uDataInicio').value=u.data_inicio||'';
    document.getElementById('uIsAdmin').checked=!!u.is_admin;
    document.getElementById('uObs').value=u.observacao||'';
  }else{
    document.getElementById('modalTitle').textContent='Novo usuário';
    document.getElementById('userId').value='';
    ['uNome','uUsuario','uSenha','uChave','uObs'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('uStatus').value='trial';
    document.getElementById('uVencimento').value='';
    document.getElementById('uDataInicio').value='';
    document.getElementById('uIsAdmin').checked=false;
  }
  document.getElementById('userModal').classList.add('open');
}

function closeModal(){document.getElementById('userModal').classList.remove('open');}

async function saveUser(){
  const id=document.getElementById('userId').value;
  const nome=document.getElementById('uNome').value.trim();
  const usuario=document.getElementById('uUsuario').value.trim();
  const senha=document.getElementById('uSenha').value.trim();
  const chave=document.getElementById('uChave').value.trim();
  const status=document.getElementById('uStatus').value;
  const venc=document.getElementById('uVencimento').value;
  const inicio=document.getElementById('uDataInicio').value;
  const is_admin=document.getElementById('uIsAdmin').checked;
  const obs=document.getElementById('uObs').value.trim();
  const msgEl=document.getElementById('modalMsg');
  if(!nome||!usuario){msgEl.innerHTML='<div class="msg msg-error">Nome e usuário são obrigatórios.</div>';return;}
  const payload={nome,usuario,chave,status,is_admin,observacao:obs,
    vencimento_em:venc?new Date(venc).toISOString():null,
    data_inicio:inicio||null,atualizado_em:new Date().toISOString()};
  if(!id&&!senha){msgEl.innerHTML='<div class="msg msg-error">Senha obrigatória para novo usuário.</div>';return;}
  if(senha)payload.senha=senha;
  let error;
  if(id){({error}=await sb.from('crm_access_users').update(payload).eq('id',id));}
  else{payload.criado_em=new Date().toISOString();({error}=await sb.from('crm_access_users').insert(payload));}
  if(error){msgEl.innerHTML=`<div class="msg msg-error">Erro: ${error.message}</div>`;return;}
  closeModal();showGlobalMsg('Salvo com sucesso.','success');loadUsers();
}

async function addDaysBtn(){
  const id=document.getElementById('userId').value;
  const days=parseInt(document.getElementById('addDays').value);
  if(!id){document.getElementById('modalMsg').innerHTML='<div class="msg msg-error">Salve o usuário primeiro.</div>';return;}
  if(!days||days<1){document.getElementById('modalMsg').innerHTML='<div class="msg msg-error">Informe a quantidade de dias.</div>';return;}
  const user=ALL_USERS.find(u=>u.id===id);
  const base=user?.vencimento_em?new Date(user.vencimento_em):new Date();
  base.setDate(base.getDate()+days);
  const newVenc=base.toISOString();
  const{error}=await sb.from('crm_access_users').update({vencimento_em:newVenc,atualizado_em:new Date().toISOString()}).eq('id',id);
  if(error){document.getElementById('modalMsg').innerHTML=`<div class="msg msg-error">Erro: ${error.message}</div>`;return;}
  document.getElementById('uVencimento').value=newVenc.slice(0,16);
  document.getElementById('modalMsg').innerHTML=`<div class="msg msg-success">${days} dias adicionados. Novo vencimento: ${base.toLocaleDateString('pt-BR')}</div>`;
  await loadUsers();
}

function openKeyModal(){
  document.getElementById('keyMsg').innerHTML='';
  document.getElementById('keyResult').style.display='none';
  document.getElementById('keyResult').textContent='';
  document.getElementById('keyDays').value='365';
  document.getElementById('keyNotes').value='';
  document.getElementById('keyModal').classList.add('open');
}
function closeKeyModal(){document.getElementById('keyModal').classList.remove('open');}

async function generateKey(){
  const days=parseInt(document.getElementById('keyDays').value);
  const notes=document.getElementById('keyNotes').value.trim();
  if(!days||days<1){document.getElementById('keyMsg').innerHTML='<div class="msg msg-error">Informe os dias.</div>';return;}
  const code='LVK-'+Array.from(crypto.getRandomValues(new Uint8Array(12))).map(b=>b.toString(16).padStart(2,'0')).join('').toUpperCase().slice(0,16);
  const{error}=await sb.from('license_keys').insert({code,duration_days:days,is_active:true,notes:notes||null,created_at:new Date().toISOString()});
  if(error){document.getElementById('keyMsg').innerHTML=`<div class="msg msg-error">Erro: ${error.message}</div>`;return;}
  const res=document.getElementById('keyResult');
  res.textContent=code;res.style.display='block';
  document.getElementById('keyMsg').innerHTML='<div class="msg msg-success">Chave criada com sucesso. Copie e envie ao cliente.</div>';
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function showGlobalMsg(text,type){
  const el=document.getElementById('globalMsg');
  el.innerHTML=`<div class="msg msg-${type}" style="margin-bottom:14px">${text}</div>`;
  setTimeout(()=>el.innerHTML='',4000);
}

document.getElementById('loginPass').addEventListener('keydown',e=>{if(e.key==='Enter')adminLogin();});
init();
</script>
</body>
</html>
